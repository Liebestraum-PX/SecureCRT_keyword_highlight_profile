# grc command → conf mapping for Paul_Network_Optimized.
# Usage:
#   Copy or append this file to ~/.grc/grc.conf
#   The system default is at /opt/homebrew/etc/grc.conf

# General log / show output (used with: grc <command>)
^([/\w\.]+\/)?(ssh|telnet)\b
conf.paul_network

# Ping
^([/\w\.]+\/)?(io|o|n|h|arp|l2)?ping[236]?\b
conf.paul_network

# Traceroute
^([/\w\.]+\/)?traceroute6?\b
conf.paul_network

# curl / wget
^([/\w\.]+\/)?(curl|wget)\b
conf.paul_network

# netstat / ss
^([/\w\.]+\/)?(netstat|ss)\b
conf.paul_network

# tail / cat log files
^([/\w\.]+\/)?(tail|cat|less|grep)\b
conf.paul_network

# nmap
^([/\w\.]+\/)?nmap\b
conf.paul_network
